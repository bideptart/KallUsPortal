<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- KallUS favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32"   href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Preconnect to Google Fonts so the stylesheet (imported in
         src/index.css) starts downloading the woff2 files in parallel with
         the JS bundle. Shaves ~150ms off first paint. -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>KallUS — AI Voice Agents</title>
    <meta name="description" content="KallUS — AI voice agents that answer every call. Pick a number, drop in your knowledge base, choose a voice, and go live in seconds." />

    <script type="module" src="/src/main.jsx"></script>
  </body>
