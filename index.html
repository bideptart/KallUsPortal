<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- KallUS favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32"   href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#4d7c0f" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Preconnect to Google Fonts so the stylesheet below starts
         downloading the woff2 files in parallel with the JS bundle. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Loaded as a real <link>, not a CSS @import, so the browser's preload
         scanner discovers it immediately instead of waiting for index.css to
         parse. The media="print" + onload swap keeps it from blocking first
         paint; noscript covers browsers/crawlers without JS. -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@500;600;700;800&family=Fragment+Mono&display=swap"
          media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@500;600;700;800&family=Fragment+Mono&display=swap" />
    </noscript>

    <title>KallUS — AI Voice Agents</title>
    <meta name="description" content="KallUS — AI voice agents that answer every call. Pick a number, drop in your knowledge base, choose a voice, and go live in seconds." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
